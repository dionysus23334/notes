  <body class="font-inter antialiased bg-white text-gray-900 tracking-tight">
    <div class="flex flex-col min-h-screen overflow-hidden">
      <header class="absolute w-full z-30"><div class="max-w-6xl mx-auto px-4 sm:px-6"><div class="flex items-center justify-between h-20"><a class="block" href="../index.html"><div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-600 to-teal-400"></div></a><a class="btn-sm text-gray-200 bg-gray-900 hover:bg-gray-800" href="../index.html">返回首页</a></div></div></header>
      <main class="grow">
        <section><div class="max-w-6xl mx-auto px-4 sm:px-6"><div class="pt-32 pb-12 md:pt-40 md:pb-20"><div class="max-w-3xl mx-auto lg:max-w-none"><article>
          <header class="max-w-3xl mx-auto mb-16 text-center"><div class="text-xl font-semibold text-teal-600 mb-2">英语阅读</div><h1 class="h1 mb-4">阅读日志模板</h1><p class="text-xl text-gray-600">这是一张用于整理英文阅读的笔记模板，重点不是抄全文，而是把文本拆成可复习的语言材料。</p></header>
          <div class="lg:flex lg:justify-between"><aside class="relative hidden lg:block w-64 mr-20 shrink-0"><div class="sticky top-28"><h4 class="text-lg font-bold mb-4">目录</h4><ul class="font-medium -my-1"><li class="py-1"><a class="hover:underline" href="#excerpt">摘录</a></li><li class="py-1"><a class="hover:underline" href="#words">词汇</a></li><li class="py-1"><a class="hover:underline" href="#retell">复述</a></li></ul></div></aside>
          <div><div class="flex items-center mb-6"><img class="relative rounded-full mr-3" src="../images/news-author-04.jpg" width="32" height="32" alt="Author" /><div><span class="text-gray-600">By </span><span class="font-medium">温习小屋</span><span class="text-gray-600"> · 模板</span></div></div><hr class="w-16 h-px pt-px bg-gray-200 border-0 mb-6" />
          <div class="text-lg text-gray-600"><p id="excerpt" class="mb-8" style="scroll-margin-top:100px;">先摘录最值得复习的 3 到 5 句话。不要追求多，优先选择有好表达、好结构、好观点的句子。</p><h3 id="words" class="h3 text-gray-900 mb-4" style="scroll-margin-top:100px;">词汇与句型</h3><ul class="list-disc list-inside mb-8"><li class="mb-2">记录关键词，不只写中文意思，还要写原句语境。</li><li class="mb-2">整理一个可以复用的句型。</li><li class="mb-2">标注自己容易误解的搭配。</li></ul><h3 id="retell" class="h3 text-gray-900 mb-4" style="scroll-margin-top:100px;">复述与总结</h3><p class="mb-8">用 3 句话复述文章：第一句说主题，第二句说作者怎么展开，第三句说你学到了什么。最后再写一个 30 秒口头复述版本。</p><a class="inline-flex items-center text-base text-blue-600 font-medium hover:underline" href="../index.html#gallery">返回笔记画廊</a></div></div></div>
        </article></div></div></div></section>
      </main>
